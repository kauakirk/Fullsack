version: "3.9"

services:
  db:
    image: postgres:15
    container_name: barber_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barberpass
      POSTGRES_DB: barber_dev
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barber-network

volumes:
  db-data:
    name: barber_db_data

networks:
  barber-network:
    driver: bridge
